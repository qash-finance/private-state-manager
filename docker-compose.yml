version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"    # HTTP
      - "50051:50051"  # gRPC
    volumes:
      - psm-storage:/var/psm/storage
      - psm-metadata:/var/psm/metadata
      - psm-keystore:/var/psm/keystore
    environment:
      - RUST_LOG=info
      - PSM_STORAGE_PATH=/var/psm/storage
      - PSM_METADATA_PATH=/var/psm/metadata
      - PSM_KEYSTORE_PATH=/var/psm/keystore
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DATABASE_URL=postgres://psm:${POSTGRES_PASSWORD}@postgres:5432/psm
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - psm-postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=psm
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=psm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psm -d psm"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  psm-storage:
  psm-metadata:
  psm-keystore:
  psm-postgres:
