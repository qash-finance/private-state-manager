# Cargo configuration for reproducible builds

[build]
# Remap source paths to make builds independent of the build directory
# This normalizes paths in debug info and error messages
rustflags = [
    "--remap-path-prefix", "/app=.",
    "--remap-path-prefix", "$HOME=~",
]

# Disable incremental compilation for reproducibility
# Incremental compilation can introduce non-determinism
incremental = false

[profile.release]
# Strip debug symbols for smaller, more reproducible binaries
strip = true
# Link-time optimization for better optimization and determinism
lto = true
# Code generation units = 1 for maximum reproducibility
# (parallel codegen can introduce non-determinism)
codegen-units = 1
